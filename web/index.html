<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>두산 블로그 초안 보드</title>
    <style>
      :root {
        --bg: #f6f1e8;
        --panel: #fffaf2;
        --ink: #1d2430;
        --muted: #6f7683;
        --line: #dbcdb6;
        --accent: #13294b;
        --accent-2: #c56b2d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top right, rgba(197, 107, 45, 0.12), transparent 22%),
          linear-gradient(180deg, #f8f4ec 0%, #f1e7d6 100%);
      }

      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 32px 20px 80px;
      }

      .hero {
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 250, 242, 0.9);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 32px;
      }

      p {
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.1fr 1.4fr;
        gap: 20px;
        margin-top: 20px;
      }

      .card {
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--panel);
      }

      .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(19, 41, 75, 0.1);
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
      }

      .meta {
        color: var(--muted);
        font-size: 14px;
      }

      textarea,
      input {
        width: 100%;
        margin-top: 8px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fffdf8;
        font: inherit;
      }

      textarea {
        min-height: 260px;
        resize: vertical;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 11px 14px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        background: var(--accent);
        color: white;
      }

      button.secondary {
        background: rgba(19, 41, 75, 0.1);
        color: var(--accent);
      }

      .images {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .image-item {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: white;
      }

      a {
        color: var(--accent-2);
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="hero">
        <span class="badge">Supabase MVP Prototype</span>
        <h1>두산 경기 블로그 초안 보드</h1>
        <p>
          경기 종료 후 생성된 제목, 본문, 태그, 이미지 후보를 검토하고 바로 복사하는 용도의
          간단한 프로토타입입니다.
        </p>
      </section>

      <div class="grid">
        <section class="card">
          <div class="badge">경기 메타</div>
          <h2>두산 vs LG</h2>
          <p class="meta">2026-04-21 · 잠실 · 원정 · 5:6 패배</p>
          <p>연장 승부 끝 한 끗 차이로 아쉬움이 남았던 경기라는 설정 예시입니다.</p>

          <div class="images">
            <div class="image-item">
              <strong>공식 채널 후보 1</strong>
              <p class="meta">출처: 두산베어스 공식 채널</p>
              <a href="https://www.instagram.com/doosanbears.1982/" target="_blank" rel="noreferrer">
                원본 링크 열기
              </a>
            </div>
          </div>
        </section>

        <section class="card">
          <label for="title"><strong>제목</strong></label>
          <input
            id="title"
            value="두산 vs LG 경기 리뷰, 연장 끝 아쉬운 패배였습니다"
          />

          <label for="body" style="display:block; margin-top:14px"><strong>본문</strong></label>
          <textarea id="body">안녕하세요 토끼돼지입니다~~~!

어제 경기 보신 분들 많으시죠?? 전체적으로 정말 아쉬움이 큰 경기였는데요, 그래도 끝까지 따라가는 힘은 분명히 보였던 것 같습니다 ㅎㅎ

중반 이후 타선이 분위기를 조금씩 끌어올린 건 반가웠고, 몇몇 장면에서는 흐름을 가져올 수도 있어 보였는데 결국 마지막 한 끗이 부족했던 경기로 보입니다.

그래도 이런 경기에서 얻는 부분도 분명히 있는 것 같습니다. 다음 경기에서는 조금 더 집중력 있는 모습이 나와주면 좋겠네요 ㅎㅎㅎ

오늘도 두산 응원하신 분들 정말 고생 많으셨습니다!</textarea>

          <label for="tags" style="display:block; margin-top:14px"><strong>태그</strong></label>
          <input id="tags" value="#두산베어스 #두산경기리뷰 #KBO리그 #잠실야구 #두산대LG" />

          <div class="actions">
            <button onclick="copyField('title')">제목 복사</button>
            <button onclick="copyField('body')">본문 복사</button>
            <button onclick="copyField('tags')">태그 복사</button>
            <button class="secondary" onclick="copyAll()">전체 복사</button>
          </div>
        </section>
      </div>
    </div>

    <script>
      async function copyField(id) {
        const el = document.getElementById(id);
        await navigator.clipboard.writeText(el.value);
      }

      async function copyAll() {
        const title = document.getElementById("title").value;
        const body = document.getElementById("body").value;
        const tags = document.getElementById("tags").value;
        const text = [title, "", body, "", tags].join("\n");
        await navigator.clipboard.writeText(text);
      }
    </script>
  </body>
  </html>
